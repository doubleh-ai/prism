<!DOCTYPE html>
<html lang="zh-CN" class="light"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Prism — AI 投资分析</title>
<link rel="stylesheet" href="/static/css/app.css?v=22">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' stop-color='%233b5d8a'/><stop offset='100%' stop-color='%236b95c8'/></linearGradient></defs><rect width='32' height='32' rx='7' fill='%231c1a16'/><circle cx='16' cy='16' r='9' fill='none' stroke='url(%23g)' stroke-width='1.8'/><circle cx='16' cy='16' r='3.5' fill='url(%23g)' opacity='.9'/></svg>">
</head><body>

<div class="app-shell" id="appShell">
  <aside class="sidebar">
    <div class="sidebar-head" onclick="document.getElementById('appShell').classList.toggle('collapsed')">
      <span class="logo">Prism</span><span class="dot"></span>
    </div>
    <button class="new-chat-btn" onclick="App.newConv()"><span>+ 新分析</span></button>
    <div class="bulk-bar" id="bulkBar"></div>
    <div class="conv-list" id="convList"><div class="conv-empty">暂无分析</div></div>
    <div class="sidebar-foot">
      <span class="foot-user-name" id="userBadge"></span>
      <span class="conv-badge" id="convBadge"></span>
      <a class="trash-link" id="trashLink" onclick="App.openTrash()" style="display:none" title="回收站">🗑</a>
      <button class="logout-link" onclick="App.logout()">退出</button>
    </div>
  </aside>

  <main class="main">
    <div class="loading-bar" id="loadingBar"></div>
    <div class="topbar">
      <button class="tb" onclick="document.getElementById('appShell').classList.toggle('collapsed')" title="折叠侧边栏"><svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M2 3.5h11M2 7.5h11M2 11.5h11" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg></button>
      <select id="modelSelect" onchange="App.setModel(this.value)"></select>
      <span class="sep"></span>
      <button class="tb" onclick="App.toggleWidth()" title="宽窄切换"><svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M2 4.5l-2 3 2 3M13 4.5l2 3-2 3M5 2.5l-2 10M10 2.5l2 10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      <button class="tb" onclick="App.toggleTheme()" title="主题"><svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="5.5" stroke="currentColor" stroke-width="1.3"/><path d="M7.5 2a5.5 5.5 0 000 11V2z" fill="currentColor" opacity=".35"/></svg></button>
    </div>

    <div class="msgs-wrap">
      <div class="msgs" id="msgList"></div>
      <div class="scroll-track" id="scrollTrack"></div>
    </div>

    <div class="input-zone">
      <div class="skills-bar" id="skillsBar"></div>
      <div class="input-wrap">
        <textarea id="input" rows="1" placeholder="输入分析主题，/ 切换技能…"></textarea>
        <button id="sendBtn" onclick="App.send()" title="发送 (Enter)">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 8h12M8 2l6 6-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
      <div class="input-hint">
        ENTER 发送 · SHIFT+ENTER 换行 · 点击技能多选
      </div>
    </div>
  </main>
</div>

<div class="ac-dropdown" id="acDropdown" style="display:none"></div>
<div class="gloss-panel" id="glossPanel" style="display:none"></div>

<!-- Trash modal -->
<div class="modal-overlay" id="trashModal" style="display:none" onclick="if(event.target===this)App.closeTrash()">
  <div class="modal-card">
    <div class="modal-hd"><h3>回收站</h3><button class="modal-close" onclick="App.closeTrash()">×</button></div>
    <div class="modal-body" id="trashList"></div>
  </div>
</div>

<script src="/static/lib/marked.min.js?v=22"></script>
<script src="/static/js/app.js?v=22"></script>
</body></html>
